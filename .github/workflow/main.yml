name: Run My Tests

on: [push, pull_request] # The triggers

jobs:
  test-logic:
    runs-on: ubuntu-latest # The type of virtual machine
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Copies your repo to the VM

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest # Or whatever command you use for testing
